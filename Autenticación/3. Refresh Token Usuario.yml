docs: |
  # POST /auth/refresh

  ## DescripciĂ³n
  Renueva la sesiĂ³n usando el `refreshToken` y retorna un nuevo par de tokens.

  ## AutenticaciĂ³n
  No requiere `Authorization` header.

  ## Content-Type
  - `application/json`

  ## Body (obligatorio)
  - `refreshToken`: token de refresco vigente.

  ## Ejemplo (JSON)

  ```json
  {
    "refreshToken": "<opaque_refresh_token>"
  }
  ```

  ## Respuesta Exitosa
  `200 OK`

  ```json
  {
    "accessToken": "<new_jwt_access_token>",
    "refreshToken": "<new_opaque_refresh_token>"
  }
  ```

  ## Comportamiento relevante
  - El refresh token se valida por hash en base de datos.
  - Si el token es vĂ¡lido, se revoca el token actual y se genera uno nuevo (rotaciĂ³n).
  - Se valida que usuario y empresa estĂ©n activos.

  ## Errores comunes
  - Refresh token invĂ¡lido/revocado/expirado: `401 Unauthorized`.
  - Usuario inactivo: `401 Unauthorized`.
  - Empresa inactiva: `401 Unauthorized`.
  - Error inesperado: `500 Internal Server Error`.
