docs: |
  # POST /medidas

  ## Descripción
  Crea una nueva medida para la empresa indicada en el body.

  ## Autenticación
  Requiere token JWT en el header:

  `Authorization: Bearer <token>`

  ## Body
  - `mdiaemid`: id de la empresa.
  - `mdianombre`: nombre de la medida.
  - `mdiaabreviatura`: abreviatura de la medida.

  ## Ejemplo

  ```json
  {
    "mdiaemid": "e2f7b231-fc3d-4010-9ec0-47ed08a34593",
    "mdianombre": "Unidad",
    "mdiaabreviatura": "UND"
  }
  ```

  ## Respuesta Exitosa
  `201 Created`

  ```json
  {
    "mdiaid": "7f4f7a99-f7dc-4b10-9326-9e4ec8300e89",
    "mdiaemid": "e2f7b231-fc3d-4010-9ec0-47ed08a34593",
    "mdianombre": "Unidad",
    "mdiaabreviatura": "UND",
    "mdiafchregistro": "2026-05-23T17:29:01.621Z",
    "mdiaestado": "activo"
  }
  ```

  ## Comportamiento relevante
  - Solo permite crear medidas en la misma empresa del usuario autenticado.
  - La empresa del usuario autenticado debe estar activa.
  - El usuario autenticado debe estar activo.
  - Roles permitidos para este endpoint: `jefe` o `empleado`.
  - No permite repetir `mdianombre` dentro de la misma empresa.
  - No permite repetir `mdiaabreviatura` dentro de la misma empresa.

  ## Errores comunes
  - Token inválido o ausente: `401 Unauthorized`.
  - `mdiaemid`, `mdianombre` o `mdiaabreviatura` ausentes: error de validación.
  - Intento de crear para otra empresa: error de autorización.
  - Medida duplicada por nombre en la misma empresa: `Medida already exists with that name`.
  - Medida duplicada por abreviatura en la misma empresa: `Medida already exists with that abbreviation`.
